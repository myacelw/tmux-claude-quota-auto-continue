# Polling interval in seconds for scanning pane output
poll_interval_seconds = 60

# Number of recent lines captured from each pane on every poll
capture_lines = 30

# Extra buffer seconds added after parsed reset time
# Helps avoid sending too early at exact reset boundary
wait_buffer_seconds = 60

# JSONL log file path
log_file = "./quota-monitor.log.jsonl"

# JSON state/lock file path
lock_file = "./quota-monitor.state.json"

# Regex patterns used to detect quota-limit messages (checked in order)
# Recommended: include named group (?P<reset_time>...) for reset time extraction.
# If no reset time can be parsed, the event is skipped (no auto-continue sent).
message_patterns = [
  "you['’]ve hit your limit\\s*[·\\-]?\\s*resets?\\s+(?P<reset_time>[0-9]{1,2}(?::[0-9]{2})?\\s*(?:am|pm))",
  "quota exceeded.*?resets?\\s+(?P<reset_time>[0-9]{1,2}(?::[0-9]{2})?\\s*(?:am|pm))",
  "rate limit.*?resets?\\s+(?P<reset_time>[0-9]{1,2}(?::[0-9]{2})?\\s*(?:am|pm))",
  "5\\s*hour\\s*limit.*?resets?\\s+(?P<reset_time>[0-9]{1,2}(?::[0-9]{2})?\\s*(?:am|pm))",
  "five\\s*hours?.*?resets?\\s+(?P<reset_time>[0-9]{1,2}(?::[0-9]{2})?\\s*(?:am|pm))"
]
